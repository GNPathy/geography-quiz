    let score = 0, qIndex = 0, activeDeck = [];

    function start(reg, top) {
        const pool = DB[reg][top];
        // Shuffle the pool and pick exactly 5
        activeDeck = [...pool].sort(() => Math.random() - 0.5).slice(0, 5);
        score = 0; qIndex = 0;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        show();
    }

    function show() {
        if (qIndex >= 5) {
            document.getElementById('game-screen').innerHTML = `<h1>Victory!</h1><h2>Score: ${score}/5</h2><button class="ans-btn" onclick="location.reload()" style="background:#22c55e">Main Menu</button>`;
            return;
        }

        const item = activeDeck[qIndex];
        document.getElementById('meta').innerText = `Score: ${score} | Q: ${qIndex + 1}/5`;
        document.getElementById('q-text').innerText = item.q;
        
        const zone = document.getElementById('ans-zone');
        zone.innerHTML = "";
        
        const choices = [...item.c].sort(() => Math.random() - 0.5);
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerText = val;
            btn.onclick = function() {
                this.onclick = null;
                if(val === item.a) {
                    score++;
                    this.style.background = "#22c55e";
                } else {
                    this.style.background = "#ef4444";
                }
                setTimeout(() => { qIndex++; show(); }, 600);
            };
            zone.appendChild(btn);
        });
    }
