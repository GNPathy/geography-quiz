<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Master 500</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .col { background: #1e293b; padding: 15px; border-radius: 15px; border: 2px solid #334155; }
        .sub-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #334155; border: 1px solid #475569; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .sub-btn:hover { background: #38bdf8; color: #0f172a; }
        #game-screen { display: none; background: #1e293b; padding: 30px; border-radius: 25px; max-width: 600px; margin: 40px auto; border: 4px solid #fbbf24; }
        .ans-btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; background: #0f3460; color: white; font-size: 1.3rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .ans-btn:active { transform: scale(0.98); }
        h1 { color: #fbbf24; text-shadow: 2px 2px #000; }
        h3 { color: #38bdf8; margin-top: 0; }
    </style>
</head>
<body>

    <h1>🌍 Geo-Master: 500 Challenge 🌍</h1>

    <div id="lobby">
        <div class="grid">
            <div class="col">
                <h3>World</h3>
                <button class="sub-btn" onclick="startGame('World', 'Capitals')">Capitals</button>
                <button class="sub-btn" onclick="startGame('World', 'Rivers')">Rivers & Seas</button>
                <button class="sub-btn" onclick="startGame('World', 'Mountains')">Mountains</button>
                <button class="sub-btn" onclick="startGame('World', 'Neighbors')">Neighbors</button>
                <button class="sub-btn" onclick="startGame('World', 'Languages')">Languages</button>
            </div>
            <div class="col">
                <h3>USA</h3>
                <button class="sub-btn" onclick="startGame('USA', 'Capitals')">State Capitals</button>
                <button class="sub-btn" onclick="startGame('USA', 'Rivers')">Rivers & Lakes</button>
                <button class="sub-btn" onclick="startGame('USA', 'Mountains')">Mountains</button>
                <button class="sub-btn" onclick="startGame('USA', 'Neighbors')">Border States</button>
                <button class="sub-btn" onclick="startGame('USA', 'Facts')">State Nicknames</button>
            </div>
            <div class="col">
                <h3>India</h3>
                <button class="sub-btn" onclick="startGame('India', 'Capitals')">State Capitals</button>
                <button class="sub-btn" onclick="startGame('India', 'Rivers')">Rivers</button>
                <button class="sub-btn" onclick="startGame('India', 'Mountains')">Mountains</button>
                <button class="sub-btn" onclick="startGame('India', 'Neighbors')">Neighbors</button>
                <button class="sub-btn" onclick="startGame('India', 'Languages')">Languages</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="meta" style="color: #94a3b8; font-size: 1.1rem;">Score: 0 | Q: 1/10</div>
        <h2 id="q-text" style="margin: 25px 0;">Loading Question...</h2>
        <div id="ans-zone"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#64748b; cursor:pointer; margin-top:20px;">Exit to Menu</button>
    </div>

<script>
    const BIG_DATA = {
        'World': {
            'Capitals': [
                {q:"France", a:"Paris", c:["Paris","Lyon","Nice","Marseille"]},
                {q:"Japan", a:"Tokyo", c:["Tokyo","Kyoto","Osaka","Hiroshima"]},
                {q:"China", a:"Beijing", c:["Beijing","Shanghai","Xian","Wuhan"]},
                {q:"Russia", a:"Moscow", c:["Moscow","Kazan","Sochi","St. Petersburg"]},
                {q:"UK", a:"London", c:["London","Manchester","Leeds","Liverpool"]},
                {q:"Australia", a:"Canberra", c:["Canberra","Sydney","Melbourne","Perth"]},
                {q:"Canada", a:"Ottawa", c:["Ottawa","Toronto","Montreal","Vancouver"]},
                {q:"Brazil", a:"Brasilia", c:["Brasilia","Rio","Sao Paulo","Recife"]},
                {q:"Egypt", a:"Cairo", c:["Cairo","Giza","Alexandria","Luxor"]},
                {q:"Germany", a:"Berlin", c:["Berlin","Munich","Hamburg","Cologne"]},
                {q:"Italy", a:"Rome", c:["Rome","Milan","Naples","Venice"]},
                {q:"Spain", a:"Madrid", c:["Madrid","Barcelona","Valencia","Seville"]},
                {q:"South Korea", a:"Seoul", c:["Seoul","Busan","Incheon","Daegu"]},
                {q:"Mexico", a:"Mexico City", c:["Mexico City","Tijuana","Cancun","Leon"]},
                {q:"Argentina", a:"Buenos Aires", c:["Buenos Aires","Rosario","Mendoza","Salta"]},
                {q:"Thailand", a:"Bangkok", c:["Bangkok","Phuket","Pattaya","Chiang Mai"]},
                {q:"Norway", a:"Oslo", c:["Oslo","Bergen","Trondheim","Stavanger"]},
                {q:"Greece", a:"Athens", c:["Athens","Patras","Larissa","Rhodes"]}
            ],
            'Rivers': [
                {q:"River in Egypt?", a:"Nile", c:["Nile","Amazon","Congo","Mississippi"]},
                {q:"River in Brazil?", a:"Amazon", c:["Amazon","Nile","Yangtze","Danube"]},
                {q:"River in London?", a:"Thames", c:["Thames","Seine","Tiber","Rhine"]},
                {q:"River in Paris?", a:"Seine", c:["Seine","Thames","Danube","Volga"]},
                {q:"Largest Ocean?", a:"Pacific", c:["Pacific","Atlantic","Indian","Arctic"]},
                {q:"Sea between Europe & Africa?", a:"Mediterranean", c:["Mediterranean","Red Sea","Dead Sea","Black Sea"]}
            ],
            'Mountains': [
                {q:"Highest in the World?", a:"Everest", c:["Everest","K2","Lhotse","Makalu"]},
                {q:"Highest in Africa?", a:"Kilimanjaro", c:["Kilimanjaro","Kenya","Meru","Stanley"]},
                {q:"Range in South America?", a:"Andes", c:["Andes","Rockies","Alps","Appalachians"]},
                {q:"Range in Europe?", a:"Alps", c:["Alps","Andes","Himalayas","Pyrenees"]}
            ],
            'Neighbors': [
                {q:"North of USA?", a:"Canada", c:["Canada","Mexico","Cuba","Russia"]},
                {q:"South of USA?", a:"Mexico", c:["Mexico","Canada","Brazil","Panama"]}
            ],
            'Languages': [
                {q:"Language of Brazil?", a:"Portuguese", c:["Portuguese","Spanish","French","English"]},
                {q:"Language of Mexico?", a:"Spanish", c:["Spanish","Portuguese","Italian","French"]}
            ]
        },
        'USA': {
            'Capitals': [
                {q:"California", a:"Sacramento", c:["Sacramento","LA","SF","San Diego"]},
                {q:"Texas", a:"Austin", c:["Austin","Houston","Dallas","San Antonio"]},
                {q:"Florida", a:"Tallahassee", c:["Tallahassee","Miami","Tampa","Orlando"]},
                {q:"New York", a:"Albany", c:["Albany","NYC","Buffalo","Rochester"]},
                {q:"Georgia", a:"Atlanta", c:["Atlanta","Savannah","Athens","Augusta"]},
                {q:"Hawaii", a:"Honolulu", c:["Honolulu","Hilo","Kona","Maui"]},
                {q:"Illinois", a:"Springfield", c:["Springfield","Chicago","Aurora","Peoria"]},
                {q:"Arizona", a:"Phoenix", c:["Phoenix","Tucson","Mesa","Chandler"]},
                {q:"Washington", a:"Olympia", c:["Olympia","Seattle","Tacoma","Spokane"]},
                {q:"Massachusetts", a:"Boston", c:["Boston","Worcester","Lowell","Cambridge"]},
                {q:"Colorado", a:"Denver", c:["Denver","Boulder","Aspen","Aurora"]},
                {q:"Oregon", a:"Salem", c:["Salem","Portland","Eugene","Bend"]},
                {q:"Michigan", a:"Lansing", c:["Lansing","Detroit","Grand Rapids","Flint"]},
                {q:"New Jersey", a:"Trenton", c:["Trenton","Newark","Jersey City","Hoboken"]}
            ],
            'Rivers': [
                {q:"Longest in USA?", a:"Missouri", c:["Missouri","Mississippi","Yukon","Rio Grande"]},
                {q:"River in Grand Canyon?", a:"Colorado", c:["Colorado","Rio Grande","Snake","Arkansas"]},
                {q:"Lake in Chicago?", a:"Lake Michigan", c:["Lake Michigan","Superior","Huron","Erie"]}
            ],
            'Mountains': [
                {q:"Tallest in Lower 48?", a:"Mt. Whitney", c:["Mt. Whitney","Mt. Rainier","Mt. Hood","Mt. Shasta"]},
                {q:"Tallest in all USA?", a:"Denali", c:["Denali","Everest","Whitney","Rainier"]}
            ],
            'Neighbors': [
                {q:"State East of California?", a:"Arizona", c:["Arizona","Oregon","Texas","Nevada"]},
                {q:"State North of Florida?", a:"Georgia", c:["Georgia","Alabama","Tennessee","S. Carolina"]}
            ],
            'Facts': [
                {q:"The Sunshine State?", a:"Florida", c:["Florida","California","Hawaii","Arizona"]},
                {q:"The Golden State?", a:"California", c:["California","Nevada","Alaska","Oregon"]}
            ]
        },
        'India': {
            'Capitals': [
                {q:"Tamil Nadu", a:"Chennai", c:["Chennai","Madurai","Salem","Coimbatore"]},
                {q:"Karnataka", a:"Bengaluru", c:["Bengaluru","Mysuru","Hubli","Belgaum"]},
                {q:"Maharashtra", a:"Mumbai", c:["Mumbai","Pune","Nagpur","Nashik"]},
                {q:"West Bengal", a:"Kolkata", c:["Kolkata","Asansol","Durgapur","Siliguri"]},
                {q:"Rajasthan", a:"Jaipur", c:["Jaipur","Jodhpur","Udaipur","Ajmer"]},
                {q:"Kerala", a:"Trivandrum", c:["Trivandrum","Kochi","Kozhikode","Munnar"]},
                {q:"Gujarat", a:"Gandhinagar", c:["Gandhinagar","Ahmedabad","Surat","Rajkot"]},
                {q:"Telangana", a:"Hyderabad", c:["Hyderabad","Warangal","Nizamabad","Khammam"]},
                {q:"Andhra Pradesh", a:"Amaravati", c:["Amaravati","Vizag","Vijayawada","Guntur"]},
                {q:"Bihar", a:"Patna", c:["Patna","Gaya","Bhagalpur","Purnia"]},
                {q:"Punjab/Haryana", a:"Chandigarh", c:["Chandigarh","Ludhiana","Amritsar","Gurgaon"]},
                {q:"Uttar Pradesh", a:"Lucknow", c:["Lucknow","Kanpur","Agra","Varanasi"]},
                {q:"Madhya Pradesh", a:"Bhopal", c:["Bhopal","Indore","Gwalior","Jabalpur"]},
                {q:"Assam", a:"Dispur", c:["Dispur","Guwahati","Tezpur","Silchar"]}
            ],
            'Rivers': [
                {q:"River in Varanasi?", a:"Ganges", c:["Ganges","Yamuna","Narmada","Tapi"]},
                {q:"River in Delhi?", a:"Yamuna", c:["Yamuna","Ganges","Indus","Beas"]},
                {q:"River in South India?", a:"Cauvery", c:["Cauvery","Godavari","Krishna","Narmada"]}
            ],
            'Mountains': [
                {q:"Highest in India?", a:"Kanchenjunga", c:["Kanchenjunga","Nanda Devi","Everest","K2"]},
                {q:"Range in the North?", a:"Himalayas", c:["Himalayas","Western Ghats","Vindhyas","Aravalis"]}
            ],
            'Neighbors': [
                {q:"Island South of India?", a:"Sri Lanka", c:["Sri Lanka","Maldives","Japan","Madagascar"]},
                {q:"Country West of India?", a:"Pakistan", c:["Pakistan","China","Nepal","Bangladesh"]}
            ],
            'Languages': [
                {q:"Tamil Nadu language?", a:"Tamil", c:["Tamil","Telugu","Malayalam","Kannada"]},
                {q:"Kerala language?", a:"Malayalam", c:["Malayalam","Tamil","Kannada","Telugu"]}
            ]
        }
    };

    let score = 0, qIdx = 0, currentDeck = [];

    function startGame(reg, top) {
        const pool = BIG_DATA[reg][top];
        if(!pool) { alert("Data coming soon!"); return; }
        
        // Pick 10 random questions
        currentDeck = [...pool].sort(() => Math.random() - 0.5).slice(0, 10);
        score = 0; qIdx = 0;
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        if (qIdx >= currentDeck.length) {
            document.getElementById('game-screen').innerHTML = `<h1>Victory!</h1><h2>Score: ${score}/${currentDeck.length}</h2><button class="ans-btn" onclick="location.reload()" style="background:#22c55e">Play Again</button>`;
            return;
        }

        const item = currentDeck[qIdx];
        document.getElementById('meta').innerText = `Score: ${score} | Q: ${qIdx + 1}/${currentDeck.length}`;
        document.getElementById('q-text').innerText = `What is the answer for: ${item.q}?`;
        
        const zone = document.getElementById('ans-zone');
        zone.innerHTML = "";
        
        const choices = [...item.c].sort(() => Math.random() - 0.5);
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerText = val;
            btn.onclick = function() {
                this.onclick = null; // Prevent double-clicking
                if(val === item.a) {
                    score++;
                    this.style.background = "#22c55e";
                } else {
                    this.style.background = "#ef4444";
                }
                setTimeout(() => { qIdx++; renderQuestion(); }, 600);
            };
            zone.appendChild(btn);
        });
    }
</script>
</body>
</html>
